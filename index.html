<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pixel World Cup — 10 000 cases</title>
  <style>
    :root{ --cell:14px; --gap:1px; }
    html,body{ height:100% }
    body{
      margin:0; color:#fff; font-family:Inter,system-ui,Arial,sans-serif;
      background:
        radial-gradient(1400px 700px at 20% -10%, #3a2df0 0%, transparent 50%),
        radial-gradient(1200px 600px at 90% 0%, transparent 45%),
        #0b0c15;
      display:flex; flex-direction:column;
    }
    a{color:#7bd3ff; text-decoration:none}
    a:hover{text-decoration:underline}

    header{
      padding:18px 20px;
      background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;}
    .brand{display:flex;align-items:center;gap:12px;}
    .logo{
      width:40px;height:40px;border-radius:10px;
      background:linear-gradient(135deg,#00ffd0,#ffe171);
      box-shadow:0 6px 18px rgba(0,0,0,.35);
    }
    .brand h1{
      margin:0;line-height:1;font-size:clamp(22px,3.6vw,36px);
      background:linear-gradient(90deg,#00ffd0,#ffe08a);
      -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    }
    .stats{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
    .pill{
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      padding:6px 10px;border-radius:999px;
      font-size:13px;color:#dbe6ff;
    }
    .countdown{color:#ffe08a;font-weight:700}
    .langSwitch{
      display:flex; gap:6px; align-items:center;
      margin-left:4px;
    }
    .langBtn{
      background:#171a2b;border:1px solid #2b2f4f;color:#eaf1ff;
      padding:6px 9px;border-radius:999px;font-size:12px;cursor:pointer;
    }
    .langBtn.active{
      background:linear-gradient(180deg,#6fd1ff,#3a86ff);
      color:#061026;border-color:#2b6ad7;font-weight:700;
    }

    .toolbar{display:flex;gap:10px;align-items:center;padding:12px 0 4px;flex-wrap:wrap;}
    .btn{
      background:#171a2b;border:1px solid #2b2f4f;color:#eaf1ff;
      padding:9px 12px;border-radius:10px;font-size:14px;cursor:pointer;
    }
    .btn.primary{
      background:linear-gradient(180deg,#6fd1ff,#3a86ff);
      color:#061026;border-color:#2b6ad7;font-weight:700;
      box-shadow:0 8px 24px rgba(58,134,255,.35);
    }
    .btn:disabled{opacity:.45;cursor:not-allowed}
    .range{accent-color:#79f}

    #stage{flex:1;padding:18px;}
    #gridWrap{
      margin:auto;background:rgba(255,255,255,.03);
      border:1px solid rgba(255,255,255,.08);border-radius:14px;
      box-shadow:0 12px 60px rgba(0,0,0,.35);
      width:max(720px,92vw);height:clamp(440px,70vh,78vh);
      overflow:auto;position:relative;
    }
    #grid{
      display:grid;grid-template-columns:repeat(100,var(--cell));
      grid-auto-rows:var(--cell);gap:var(--gap);
      background:#151934;
      width:calc(100*var(--cell) + 99*var(--gap));
      height:calc(100*var(--cell) + 99*var(--gap));
      position:relative; z-index:1;
    }
    .cell{
      width:var(--cell);height:var(--cell);
      background:#2b2f55;border:1px solid #3b3f68;
      box-sizing:border-box;cursor:pointer;transition:background .12s;
    }
    .cell:hover{background:#3b3f68}
    .sel{outline:1px solid #bcd1ff;}
    .sold{background:#1e223f;border-color:#535a87;cursor:default;}

    #selectionBox{
      position:absolute;pointer-events:none;border:2px dashed #7fb3ff;
      background:rgba(127,179,255,.15);display:none;z-index:5;
    }

    footer{
      padding:14px 18px;border-top:1px solid rgba(255,255,255,.08);
      text-align:center;color:#bcd1ff;
      background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);
    }

    .modalWrap{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.55);z-index:10}
    .modal{
      width:min(560px,92vw);background:#0f1224;border:1px solid #2a2e52;
      border-radius:14px;padding:16px 16px 10px;
      box-shadow:0 30px 100px rgba(0,0,0,.6);
    }
    .modal h3{margin:0 0 10px}
    .row{display:flex;gap:10px;margin:8px 0;flex-wrap:wrap}
    .row label{width:140px;color:#d0d8ff;font-size:14px}
    .row input,.row textarea{
      flex:1;background:#171a35;border:1px solid #2b2f66;
      border-radius:8px;color:#eef;padding:8px 10px;font-size:14px;
    }
    .modal .actions{display:flex;justify-content:flex-end;gap:10px;margin-top:10px}
    .priceTag{font-weight:800;color:#9effb6}
    .muted{color:#9aa;font-size:13px;white-space:pre-wrap}
    .smallNote{font-size:12px;color:#9aa;margin-top:4px}
    #errors{
      position:fixed;right:10px;bottom:10px;max-width:60ch;
      background:#2a1033;border:1px solid #723b87;
      border-radius:8px;padding:10px;display:none;white-space:pre-wrap;
    }
    #uploadStatus{font-size:12px;color:#9aa;margin-top:4px}
  </style>
</head>
<body>

<header>
  <div class="topbar">
    <div class="brand"><div class="logo"></div><h1>Pixel World Cup</h1></div>
    <div class="stats">
      <span class="pill"><span id="totalLabel">Total</span> : <b>10 000</b></span>
      <span class="pill"><span id="soldLabel">Vendues</span> : <b id="soldCount">0</b></span>
      <span class="pill"><span id="freeLabel">Disponibles</span> : <b id="freeCount">10 000</b></span>
      <span class="pill countdown"><span id="endLabel">Fin</span> : <b id="countdown">—</b></span>
      <a class="pill" href="/about" id="howLink">Comment ça marche ?</a>
      <div class="langSwitch">
        <button id="langFr" class="langBtn" type="button">FR</button>
        <button id="langEn" class="langBtn" type="button">EN</button>
      </div>
    </div>
  </div>
  <div class="toolbar">
    <button id="buyBtn" class="btn primary" disabled>Acheter mes cases</button>
    <button id="clearSelBtn" class="btn">Désélectionner</button>
    <label><span id="zoomLabel">Zoom</span> <input id="zoom" class="range" type="range" min="10" max="24" step="1" value="14"/></label>
  </div>
</header>

<div id="stage">
  <div id="gridWrap">
    <div id="grid"></div>
    <div id="selectionBox"></div>
  </div>
</div>

<footer>©️ 2026 Pixel World Cup.</footer>

<div id="modalWrap" class="modalWrap">
  <div class="modal">
    <h3 id="checkoutTitle">Finaliser l’achat</h3>

    <div class="row"><label id="nameLabel">Votre nom</label><input id="mName" placeholder="Nom affiché publiquement"/></div>
    <div class="row"><label id="emailLabel">Email</label><input id="mEmail" type="email" placeholder="ton.email@example.com"/></div>

    <div class="row">
      <label id="urlLabel">URL</label>
      <input id="mLink" placeholder="[https://example.com"/]https://example.com"/>
    </div>

    <div class="row"><label id="colorLabel">Couleur</label><input id="mColor" type="color" value="#1e90ff"/></div>

    <div class="row">
      <label id="imageLabel">Image / Logo</label>
      <input id="mLogoFile" type="file" accept="image/png,image/jpeg,image/webp,image/gif"/>
    </div>
    <div class="smallNote" id="imageFormatsNote">Formats acceptés : PNG, JPG/JPEG, WEBP, GIF — max 8 MB</div>
    <div id="uploadStatus"></div>

    <div class="row"><label id="messageLabel">Message</label><textarea id="mMsg" rows="2" placeholder="Petit message optionnel…"></textarea></div>

    <div class="muted">
      <span id="selectedCasesLabel">Cases sélectionnées</span> : <b id="selCount">0</b> — <span id="totalPriceLabel">Total</span> : <span class="priceTag" id="totalPrice">0 €</span>
      <div id="lotRule" class="muted"></div>
    </div>

    <div class="actions">
      <button id="cancelBuy" class="btn">Annuler</button>
      <button id="confirmStripe" class="btn primary" disabled>Confirmer & Payer</button>
    </div>
  </div>
</div>

<div id="errors"></div>

<script>
(function(){
  const box = document.getElementById('errors');
  window.addEventListener('error', (e)=>{
    box.style.display='block';
    box.textContent = 'Erreur : ' + (e.error?.message || e.message || e.filename);
  });
  window.addEventListener('unhandledrejection', (e)=>{
    box.style.display='block';
    box.textContent = 'Promise rejetée : ' + (e.reason?.message || e.reason || '');
  });
})();

document.addEventListener("DOMContentLoaded", () => {
  const translations = {
    fr: {
      total: "Total",
      sold: "Vendues",
      free: "Disponibles",
      end: "Fin",
      how: "Comment ça marche ?",
      buy: "Acheter mes cases",
      clear: "Désélectionner",
      zoom: "Zoom",
      checkout: "Finaliser l’achat",
      name: "Votre nom",
      namePlaceholder: "Nom affiché publiquement",
      email: "Email",
      emailPlaceholder: "ton.email@example.com",
      url: "URL",
      urlPlaceholder: "https://exemple.com",
      color: "Couleur",
      image: "Image / Logo",
      imageFormats: "Formats acceptés : PNG, JPG/JPEG, WEBP, GIF — max 8 MB",
      message: "Message",
      messagePlaceholder: "Petit message optionnel…",
      selectedCases: "Cases sélectionnées",
      totalPrice: "Total",
      cancel: "Annuler",
      confirm: "Confirmer & Payer",
      competitionEnded: "Compétition terminée.",
      selectCases: "Sélectionne des cases.",
      enterEmail: "Mets ton email.",
      enterEmailForQuote: "Entre ton email",
      quoteCalculating: "Calcul…",
      quoteError: "Erreur devis",
      quoteRejected: "Devis refusé",
      rulePrefix: "Règle : ",
      uploadLoading: "⏳ Upload de l’image…",
      uploadDone: "✅ Image téléversée",
      uploadError: "Erreur upload image",
      paymentError: "Erreur paiement",
      loadingZero: "0 €",
      countdownEnded: "Terminé"
    },
    en: {
      total: "Total",
      sold: "Sold",
      free: "Available",
      end: "Ends",
      how: "How does it work?",
      buy: "Buy my pixels",
      clear: "Clear selection",
      zoom: "Zoom",
      checkout: "Complete purchase",
      name: "Your name",
      namePlaceholder: "Public display name",
      email: "Email",
      emailPlaceholder: "your.email@example.com",
      url: "URL",
      urlPlaceholder: "https://example.com",
      color: "Color",
      image: "Image / Logo",
      imageFormats: "Accepted formats: PNG, JPG/JPEG, WEBP, GIF — max 8 MB",
      message: "Message",
      messagePlaceholder: "Optional short message…",
      selectedCases: "Selected cells",
      totalPrice: "Total",
      cancel: "Cancel",
      confirm: "Confirm & Pay",
      competitionEnded: "Competition ended.",
      selectCases: "Select some cells.",
      enterEmail: "Enter your email.",
      enterEmailForQuote: "Enter your email",
      quoteCalculating: "Calculating…",
      quoteError: "Quote error",
      quoteRejected: "Quote rejected",
      rulePrefix: "Rule: ",
      uploadLoading: "⏳ Uploading image…",
      uploadDone: "✅ Image uploaded",
      uploadError: "Image upload error",
      paymentError: "Payment error",
      loadingZero: "€0.00",
      countdownEnded: "Ended"
    }
  };

  function detectLang(){
    const saved = localStorage.getItem("pwc-lang");
    if (saved === "fr" || saved === "en") return saved;
    return navigator.language && navigator.language.toLowerCase().startsWith("fr") ? "fr" : "en";
  }

  let currentLang = detectLang();
  let t = translations[currentLang];

  function tr(key){
    return t[key] || key;
  }

  function applyTranslations(){
    t = translations[currentLang];
    document.documentElement.lang = currentLang;

    document.getElementById("totalLabel").textContent = tr("total");
    document.getElementById("soldLabel").textContent = tr("sold");
    document.getElementById("freeLabel").textContent = tr("free");
    document.getElementById("endLabel").textContent = tr("end");
    document.getElementById("howLink").textContent = tr("how");
    document.getElementById("buyBtn").textContent = tr("buy");
    document.getElementById("clearSelBtn").textContent = tr("clear");
    document.getElementById("zoomLabel").textContent = tr("zoom");
    document.getElementById("checkoutTitle").textContent = tr("checkout");
    document.getElementById("nameLabel").textContent = tr("name");
    document.getElementById("emailLabel").textContent = tr("email");
    document.getElementById("urlLabel").textContent = tr("url");
    document.getElementById("colorLabel").textContent = tr("color");
    document.getElementById("imageLabel").textContent = tr("image");
    document.getElementById("imageFormatsNote").textContent = tr("imageFormats");
    document.getElementById("messageLabel").textContent = tr("message");
    document.getElementById("selectedCasesLabel").textContent = tr("selectedCases");
    document.getElementById("totalPriceLabel").textContent = tr("totalPrice");
    document.getElementById("cancelBuy").textContent = tr("cancel");
    document.getElementById("confirmStripe").textContent = tr("confirm");

    document.getElementById("mName").placeholder = tr("namePlaceholder");
    document.getElementById("mEmail").placeholder = tr("emailPlaceholder");
    document.getElementById("mLink").placeholder = tr("urlPlaceholder");
    document.getElementById("mMsg").placeholder = tr("messagePlaceholder");

    document.getElementById("langFr").classList.toggle("active", currentLang === "fr");
    document.getElementById("langEn").classList.toggle("active", currentLang === "en");

    updateUI(false);
  }

  document.getElementById("langFr").addEventListener("click", ()=>{
    currentLang = "fr";
    localStorage.setItem("pwc-lang", currentLang);
    applyTranslations();
  });

  document.getElementById("langEn").addEventListener("click", ()=>{
    currentLang = "en";
    localStorage.setItem("pwc-lang", currentLang);
    applyTranslations();
  });

  const COLS=100, ROWS=100, TOTAL=COLS*ROWS;
  const DEADLINE = new Date('2026-12-31T23:59:59+01:00');

  const grid=document.getElementById('grid'),
        gridWrap=document.getElementById('gridWrap'),
        selectionBox=document.getElementById('selectionBox'),
        buyBtn=document.getElementById('buyBtn'),
        clearBtn=document.getElementById('clearSelBtn'),
        zoom=document.getElementById('zoom'),
        soldEl=document.getElementById('soldCount'),
        freeEl=document.getElementById('freeCount'),
        countdownEl=document.getElementById('countdown'),
        modalWrap=document.getElementById('modalWrap'),
        mEmail=document.getElementById('mEmail'),
        selCountEl=document.getElementById('selCount'),
        totalPriceEl=document.getElementById('totalPrice'),
        lotRuleEl=document.getElementById('lotRule'),
        confirmBtn=document.getElementById('confirmStripe'),
        uploadStatus=document.getElementById('uploadStatus');

  const selection = new Set();
  let LAST_GRID_DATA = null;
  let uploadedLogoUrl = "";

  const stepPx = () => {
    const cell = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--cell'))||14;
    const gap  = parseInt(getComputedStyle(grid).gap)||1;
    return cell + gap;
  };

  const idAtClientPoint = (clientX, clientY) => {
    const rect = grid.getBoundingClientRect();
    const s = stepPx();
    const x = Math.floor((clientX - rect.left) / s);
    const y = Math.floor((clientY - rect.top)  / s);
    if (x<0 || y<0 || x>=COLS || y>=ROWS) return null;
    return `${x}:${y}`;
  };

  (function buildGrid(){
    const frag=document.createDocumentFragment();
    for(let y=0;y<ROWS;y++){
      for(let x=0;x<COLS;x++){
        const d=document.createElement('div');
        d.className='cell';
        d.dataset.x=x; d.dataset.y=y;
        frag.appendChild(d);
      }
    }
    grid.appendChild(frag);
  })();

  grid.addEventListener('click', (e)=>{
    const cell = e.target.closest('.cell');
    if(!cell) return;
    const id = `${cell.dataset.x}:${cell.dataset.y}`;

    if (e.altKey) {
      selection.clear();
      grid.querySelectorAll('.cell.sel').forEach(n=>n.classList.remove('sel'));
    }

    if (selection.has(id)) { selection.delete(id); cell.classList.remove('sel'); }
    else { selection.add(id); cell.classList.add('sel'); }

    updateUI(true);
  });

  let dragging=false, startId=null;
  gridWrap.addEventListener('mousedown',(e)=>{
    const id = idAtClientPoint(e.clientX, e.clientY);
    if (!id) return;
    dragging = true; startId = id;

    if (e.altKey) {
      selection.clear();
      grid.querySelectorAll('.cell.sel').forEach(n=>n.classList.remove('sel'));
    }

    const s = stepPx();
    const [sx, sy] = startId.split(':').map(Number);
    selectionBox.style.display='block';
    selectionBox.style.left  = (sx * s) + 'px';
    selectionBox.style.top   = (sy * s) + 'px';
    selectionBox.style.width = s + 'px';
    selectionBox.style.height= s + 'px';
    e.preventDefault();
  });

  window.addEventListener('mousemove',(e)=>{
    if(!dragging) return;
    const curId = idAtClientPoint(e.clientX, e.clientY);
    if(!curId) return;

    const s = stepPx();
    const [sx, sy] = startId.split(':').map(Number);
    const [cx, cy] = curId.split(':').map(Number);
    const x1 = Math.min(sx, cx), x2 = Math.max(sx, cx);
    const y1 = Math.min(sy, cy), y2 = Math.max(sy, cy);

    selectionBox.style.display='block';
    selectionBox.style.left   = (x1 * s) + 'px';
    selectionBox.style.top    = (y1 * s) + 'px';
    selectionBox.style.width  = ((x2 - x1 + 1) * s - (parseInt(getComputedStyle(grid).gap)||1)) + 'px';
    selectionBox.style.height = ((y2 - y1 + 1) * s - (parseInt(getComputedStyle(grid).gap)||1)) + 'px';

    for(let y=y1;y<=y2;y++){
      for(let x=x1;x<=x2;x++){
        const id = `${x}:${y}`;
        if(!selection.has(id)){
          selection.add(id);
          const node = grid.querySelector(`.cell[data-x="${x}"][data-y="${y}"]`);
          if (node) node.classList.add('sel');
        }
      }
    }
    updateUI(true);
  });

  window.addEventListener('mouseup',()=>{
    if(!dragging) return;
    dragging=false; startId=null;
    selectionBox.style.display='none';
  });

  function currentRect(){
    if (selection.size===0) return null;
    let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
    for(const id of selection){
      const [x,y]=id.split(':').map(Number);
      minX=Math.min(minX,x); minY=Math.min(minY,y);
      maxX=Math.max(maxX,x); maxY=Math.max(maxY,y);
    }
    return { x:minX, y:minY, w:maxX-minX+1, h:maxY-minY+1 };
  }

  function updateUI(resetPrice){
    const sold = (LAST_GRID_DATA && LAST_GRID_DATA.cells)
      ? Object.keys(LAST_GRID_DATA.cells).length : 0;
    soldEl.textContent = sold.toLocaleString(currentLang === "fr" ? "fr-FR" : "en-US");
    freeEl.textContent = (TOTAL - sold).toLocaleString(currentLang === "fr" ? "fr-FR" : "en-US");

    const qty = selection.size;
    selCountEl.textContent = qty;

    if (resetPrice) {
      totalPriceEl.textContent = qty ? tr("quoteCalculating") : tr("loadingZero");
      lotRuleEl.textContent = '';
      confirmBtn.disabled = true;
    }

    buyBtn.disabled = qty === 0 || new Date()>=DEADLINE;
  }

  (function tick(){
    const ms = DEADLINE - new Date();
    if (ms <= 0) {
      countdownEl.textContent = tr("countdownEnded");
      buyBtn.disabled = true;
      return;
    }
    const s = Math.floor(ms/1000);
    const d = Math.floor(s/86400);
    const h = Math.floor((s%86400)/3600);
    const m = Math.floor((s%3600)/60);
    const sec = s%60;
    countdownEl.textContent = `${d}j ${h}h ${m}m ${sec}s`;
    setTimeout(tick, 1000);
  })();

  buyBtn.addEventListener('click', async ()=>{
    if(selection.size===0) return;
    if(new Date()>=DEADLINE){ alert(tr('competitionEnded')); return; }
    await refreshQuoteInModal();
    modalWrap.style.display='flex';
  });

  document.getElementById('cancelBuy').addEventListener('click', ()=>{
    modalWrap.style.display='none';
  });

  clearBtn.addEventListener('click', ()=>{
    selection.clear();
    grid.querySelectorAll('.cell.sel').forEach(n=>n.classList.remove('sel'));
    updateUI(true);
  });

  const API_BASE = window.location.origin;

  async function postJSON(url, body){
    const r = await fetch(url, {
      method:'POST',
      headers:{'content-type':'application/json'},
      body:JSON.stringify(body)
    });
    const data = await r.json().catch(()=> ({}));
    return { ok:r.ok, data };
  }

  async function uploadImageIfNeeded() {
    const fileInput = document.getElementById("mLogoFile");
    const file = fileInput.files && fileInput.files[0];

    if (!file) {
      uploadedLogoUrl = "";
      return "";
    }

    uploadStatus.textContent = tr("uploadLoading");

    const formData = new FormData();
    formData.append("image", file);

    const r = await fetch(`${API_BASE}/api/upload-image`, {
      method: "POST",
      body: formData
    });

    const data = await r.json().catch(() => ({}));

    if (!r.ok || !data.ok || !data.url) {
      throw new Error(data.error || tr("uploadError"));
    }

    uploadedLogoUrl = data.url;
    uploadStatus.textContent = tr("uploadDone");
    return uploadedLogoUrl;
  }

  async function loadGridState(){
    try{
      const r = await fetch(`${API_BASE}/api/cells?ts=${Date.now()}`);
      const data = await r.json();
      if (data && data.ok) renderSoldAndLogos(data);
    }catch(e){ console.warn('loadGridState error', e); }
  }

  function renderSoldAndLogos(data){
    LAST_GRID_DATA = data;

    const wrap = document.getElementById('gridWrap');
    const s = stepPx();
    const gap = parseInt(getComputedStyle(grid).gap)||1;

    let art = document.getElementById('artLayer');
    if (art) art.remove();

    art = document.createElement('div');
    art.id = 'artLayer';
    art.style.position = 'absolute';
    art.style.inset = '0';
    art.style.pointerEvents = 'none';
    art.style.zIndex = '2';
    wrap.appendChild(art);

    grid.querySelectorAll('.cell.sold').forEach(n=>n.classList.remove('sold'));

    const lots = {};
    for (const key of Object.keys((data && data.cells) ? data.cells : {})) {
      const hist = data.cells[key];
      const info = Array.isArray(hist) ? hist[hist.length - 1] : null;
      if (!info) continue;
      const lotKey = `${info.lotOriginX}:${info.lotOriginY}:${info.lotW}:${info.lotH}`;
      if (!lots[lotKey]) lots[lotKey] = info;
    }

    for (const lotKey of Object.keys(lots)) {
      const info = lots[lotKey];

      for (let yy = info.lotOriginY; yy < info.lotOriginY + info.lotH; yy++) {
        for (let xx = info.lotOriginX; xx < info.lotOriginX + info.lotW; xx++) {
          const node = grid.querySelector(`.cell[data-x="${xx}"][data-y="${yy}"]`);
          if (node) node.classList.add('sold');
        }
      }

      const left = info.lotOriginX * s;
      const top  = info.lotOriginY * s;
      const wpx  = info.lotW * s - gap;
      const hpx  = info.lotH * s - gap;

      const box = document.createElement('div');
      box.style.position = 'absolute';
      box.style.left  = left+'px';
      box.style.top   = top+'px';
      box.style.width = wpx+'px';
      box.style.height= hpx+'px';
      box.style.border = '1px solid rgba(255,255,255,.25)';
      box.style.borderRadius = '2px';
      box.style.boxSizing = 'border-box';
      box.style.pointerEvents = 'none';
      box.style.background = info.color || '#1e90ff';

      box.dataset.link = info.link || '';
      box.dataset.ox = info.lotOriginX;
      box.dataset.oy = info.lotOriginY;
      box.dataset.lw = info.lotW;
      box.dataset.lh = info.lotH;

      if (info.logo) {
        const img = document.createElement('img');
        img.src = info.logo;
        img.alt = info.name || '';
        img.style.width='100%';
        img.style.height='100%';
        img.style.display='block';
        img.style.objectFit='cover';
        img.style.objectPosition='center';
        img.draggable=false;
        box.appendChild(img);
      }

      art.appendChild(box);
    }

    updateUI(false);
  }

  gridWrap.addEventListener('dblclick', (e)=>{
    const id = idAtClientPoint(e.clientX, e.clientY);
    if (!id) return;
    const [cx, cy] = id.split(':').map(Number);

    const art = document.getElementById('artLayer');
    if (!art) return;

    for (const box of art.children) {
      const ox = +box.dataset.ox, oy = +box.dataset.oy;
      const lw = +box.dataset.lw, lh = +box.dataset.lh;
      if (cx >= ox && cx < ox+lw && cy >= oy && cy < oy+lh) {
        const link = box.dataset.link;
        if (link) window.open(link, '_blank');
        break;
      }
    }
  });

  zoom.addEventListener('input', e=>{
    document.documentElement.style.setProperty('--cell', e.target.value+'px');
    if (LAST_GRID_DATA) renderSoldAndLogos(LAST_GRID_DATA);
  });

  async function refreshQuoteInModal(){
    try{
      const rect = currentRect();
      if (!rect){ totalPriceEl.textContent='0 €'; confirmBtn.disabled=true; return; }

      const buyerEmail=(mEmail.value||'').trim();
      if(!buyerEmail){
        totalPriceEl.textContent = tr('enterEmailForQuote');
        confirmBtn.disabled=true;
        return;
      }

      const body = { ...rect, buyerEmail };
      const q = await postJSON(`${API_BASE}/api/purchase-rect/quote`, body);

      if(!q.ok){
        totalPriceEl.textContent='—';
        lotRuleEl.textContent = q.data?.lotRule ? (tr('rulePrefix') + q.data.lotRule)
                                                : (q.data?.error || tr('quoteError'));
        confirmBtn.disabled=true;
        return;
      }

      const euros = (q.data.totalCents||0)/100;
      totalPriceEl.textContent = euros.toLocaleString(
        currentLang === "fr" ? "fr-FR" : "en-US",
        { style:'currency', currency:'EUR' }
      );
      lotRuleEl.textContent = q.data?.lotRule ? (tr('rulePrefix') + q.data.lotRule) : '';
      confirmBtn.disabled=false;
    }catch(e){
      totalPriceEl.textContent='—';
      confirmBtn.disabled=true;
    }
  }

  mEmail.addEventListener('input', refreshQuoteInModal);

  confirmBtn.addEventListener('click', async ()=>{
    const rect = currentRect();
    if(!rect){ alert(tr('selectCases')); return; }
    if(new Date()>=DEADLINE){ alert(tr('competitionEnded')); return; }

    const buyerEmail=(mEmail.value||'').trim();
    if(!buyerEmail){ alert(tr('enterEmail')); return; }

    let logoUrl = "";
    try {
      logoUrl = await uploadImageIfNeeded();
    } catch (e) {
      alert(e.message || tr("uploadError"));
      return;
    }

    const name  = (document.getElementById('mName').value||'').trim();
    const link  = (document.getElementById('mLink').value||'').trim();
    const color = (document.getElementById('mColor').value||'#1e90ff').trim();
    const msg   = (document.getElementById('mMsg').value||'').trim();

    const body = { ...rect, buyerEmail, name, link, logo: logoUrl, color, msg };

    const q = await postJSON(`${API_BASE}/api/purchase-rect/quote`, body);
    if(!q.ok){ alert(q.data?.lotRule || q.data?.error || tr('quoteRejected')); return; }

    const r = await postJSON(`${API_BASE}/api/purchase-rect/checkout`, body);
    if(!r.ok || !r.data?.ok){ alert(r.data?.error || tr('paymentError')); return; }

    window.location.href = r.data.url;
  });

  loadGridState();
  document.addEventListener('visibilitychange', ()=>{
    if(!document.hidden) loadGridState();
  });
  setInterval(loadGridState, 20000);

  applyTranslations();
  updateUI(true);
});
</script>
</body>
</html>
