<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Payment successful — Pixel World Cup</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:system-ui,Arial,sans-serif;
      background:#0b0c15;
      color:#fff;
      padding:20px;
      box-sizing:border-box;
    }
    .box{
      max-width:520px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.14);
      padding:24px;
      border-radius:16px;
      text-align:center;
    }
    a{
      display:inline-block;
      margin-top:12px;
      padding:10px 14px;
      background:#3a86ff;
      color:#061026;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .langSwitch{
      display:flex;
      gap:6px;
      justify-content:center;
      margin-bottom:14px;
    }
    .langBtn{
      background:#171a2b;
      border:1px solid #2b2f4f;
      color:#eaf1ff;
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      cursor:pointer;
    }
    .langBtn.active{
      background:linear-gradient(180deg,#6fd1ff,#3a86ff);
      color:#061026;
      border-color:#2b6ad7;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="langSwitch">
      <button id="langFr" class="langBtn" type="button">FR</button>
      <button id="langEn" class="langBtn" type="button">EN</button>
    </div>

    <h1 id="title">✅ Achat validé !</h1>
    <p id="line1">Ton bloc est affiché sur la grille.</p>
    <p id="line2"><b>Astuce :</b> double-clique sur un bloc pour ouvrir le site du client.</p>
    <a href="/" id="backLink">← Retour à la grille</a>
  </div>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const translations = {
    fr: {
      htmlLang: "fr",
      title: "✅ Achat validé !",
      line1: "Ton bloc est affiché sur la grille.",
      line2: "<b>Astuce :</b> double-clique sur un bloc pour ouvrir le site du client.",
      back: "← Retour à la grille",
      pageTitle: "Paiement réussi — Pixel World Cup"
    },
    en: {
      htmlLang: "en",
      title: "✅ Purchase confirmed!",
      line1: "Your block is now displayed on the grid.",
      line2: "<b>Tip:</b> double-click a block to open the client’s website.",
      back: "← Back to the grid",
      pageTitle: "Payment successful — Pixel World Cup"
    }
  };

  function detectLang(){
    const saved = localStorage.getItem("pwc-lang");
    if (saved === "fr" || saved === "en") return saved;
    return navigator.language && navigator.language.toLowerCase().startsWith("fr") ? "fr" : "en";
  }

  let currentLang = detectLang();

  function applyTranslations(lang){
    const t = translations[lang];
    document.documentElement.lang = t.htmlLang;
    document.title = t.pageTitle;

    document.getElementById("title").textContent = t.title;
    document.getElementById("line1").textContent = t.line1;
    document.getElementById("line2").innerHTML = t.line2;
    document.getElementById("backLink").textContent = t.back;

    document.getElementById("langFr").classList.toggle("active", lang === "fr");
    document.getElementById("langEn").classList.toggle("active", lang === "en");
  }

  document.getElementById("langFr").addEventListener("click", () => {
    currentLang = "fr";
    localStorage.setItem("pwc-lang", currentLang);
    applyTranslations(currentLang);
  });

  document.getElementById("langEn").addEventListener("click", () => {
    currentLang = "en";
    localStorage.setItem("pwc-lang", currentLang);
    applyTranslations(currentLang);
  });

  applyTranslations(currentLang);
});
</script>
</body>
</html>
